<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nailsalon minth 予約</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--pink:#D4537E;--pink-light:#FBEAF0;--pink-mid:#ED93B1;--pink-dark:#993556;--purple:#534AB7;--purple-light:#EEEDFE;--bg:#fff;--bg2:#f8f8f8;--text:#1a1a1a;--text2:#666;--text3:#aaa;--border:#e0e0e0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;background:var(--bg);color:var(--text)}
.app{max-width:480px;margin:0 auto;padding:0;min-height:100vh}
.header{padding:1.2rem 1rem 1rem;border-bottom:1px solid var(--border);text-align:center}
.header h1{font-size:18px;font-weight:500;letter-spacing:0.05em}
.header p{font-size:12px;color:var(--text2);margin-top:4px}
.tab-bar{display:flex;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:12px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s}
.tab.active{color:var(--pink);border-bottom-color:var(--pink);font-weight:500}
.view{display:none;padding:1rem}.view.active{display:block}
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.week-nav button{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;color:var(--text)}
.week-nav span{font-size:14px;font-weight:500}
.week-grid{width:100%;border-collapse:collapse;font-size:13px}
.week-grid th{text-align:center;padding:8px 4px;font-weight:400;font-size:12px;color:var(--text2)}
.week-grid th.date-col{font-size:13px;color:var(--text)}
.week-grid th.today-col{color:var(--pink);font-weight:500}
.week-grid th.sun{color:#E24B4A}
.week-grid th.sat{color:#185FA5}
.week-grid td{text-align:center;padding:6px 2px;border-top:1px solid #f0f0f0}
.week-grid td.time-label{font-size:11px;color:var(--text3);text-align:left;padding-left:4px;white-space:nowrap}
.slot-btn{width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;font-size:11px;display:inline-flex;align-items:center;justify-content:center;transition:all 0.15s}
.slot-btn.available{background:none;color:var(--pink);border:1.5px solid var(--pink)}
.slot-btn.available:hover{background:var(--pink-light)}
.slot-btn.booked,.slot-btn.closed{background:none;color:var(--text3);border:none;cursor:default;font-size:14px}
.slot-btn.night-available{background:none;color:var(--purple);border:1.5px solid var(--purple)}
.slot-btn.night-available:hover{background:var(--purple-light)}
.slot-btn.selected{background:var(--pink);color:#fff;border-color:var(--pink)}
.form-overlay{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);border-radius:16px 16px 0 0;padding:1.25rem;z-index:100;max-height:85vh;overflow-y:auto;box-shadow:0 -4px 20px rgba(0,0,0,0.08)}
.form-overlay.open{display:block}
.form-handle{width:40px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 1rem}
.form-title{font-size:15px;font-weight:500;margin-bottom:1rem}
.selected-info{background:var(--pink-light);border-radius:8px;padding:10px 14px;margin-bottom:1rem;font-size:13px;color:var(--pink-dark)}
.night-notice{background:var(--purple-light);border-radius:8px;padding:10px 14px;margin-bottom:1rem;font-size:13px;color:var(--purple)}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:#fff;color:var(--text);font-family:inherit}
.field textarea{resize:none;height:60px}
.btn-primary{background:var(--pink);color:#fff;border:none;padding:13px;border-radius:8px;font-size:14px;cursor:pointer;width:100%;font-weight:500;margin-top:4px;font-family:inherit}
.btn-primary:hover{background:var(--pink-dark)}
.btn-primary:disabled{background:#e0e0e0;color:#aaa;cursor:default}
.btn-cancel{background:none;border:1px solid var(--border);color:var(--text2);padding:10px;border-radius:8px;font-size:13px;cursor:pointer;width:100%;margin-top:8px;font-family:inherit}
.success-view{text-align:center;padding:3rem 1rem}
.success-view .icon{font-size:48px;color:var(--pink);display:block;margin-bottom:1rem}
.success-view h2{font-size:17px;font-weight:500;margin-bottom:8px}
.success-view p{font-size:13px;color:var(--text2);line-height:1.7}
.btn-again{background:var(--pink-light);color:var(--pink-dark);border:none;padding:12px 32px;border-radius:8px;font-size:14px;cursor:pointer;margin-top:1.5rem;font-weight:500;font-family:inherit}
.pw-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1.5rem;text-align:center}
.pw-screen p{font-size:14px;color:var(--text2);margin-bottom:1.5rem}
.pw-input-row{display:flex;gap:8px;width:100%;max-width:280px}
.pw-input-row input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit}
.pw-input-row button{padding:10px 16px;background:var(--pink);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:500;font-family:inherit}
.pw-error{color:#A32D2D;font-size:13px;margin-top:8px}
.admin-section{margin-bottom:1.5rem}
.section-label{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em}
.booking-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.booking-card .name{font-size:14px;font-weight:500;margin-bottom:3px}
.booking-card .detail{font-size:12px;color:var(--text2);line-height:1.7}
.badge{font-size:10px;padding:2px 8px;border-radius:100px;margin-left:6px;display:inline-block}
.badge-night{background:var(--purple-light);color:var(--purple)}
.badge-new{background:var(--pink-light);color:var(--pink-dark)}
.btn-del{background:none;border:1px solid #F09595;border-radius:8px;padding:6px 10px;cursor:pointer;color:#A32D2D;font-size:12px}
.btn-del:hover{background:#FCEBEB}
.empty-msg{text-align:center;padding:2rem;color:var(--text3);font-size:13px}
.filter-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-row input{padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;flex:1;min-width:100px;font-family:inherit}
.closed-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.closed-row input{padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit}
.closed-row button{padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;background:#fff;font-family:inherit}
.closed-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.closed-tag{background:var(--bg2);border:1px solid var(--border);border-radius:100px;padding:4px 10px;font-size:12px;display:flex;align-items:center;gap:5px}
.closed-tag button{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:0}
.sync-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;color:var(--text2);margin-bottom:12px;font-family:inherit}
.logout-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--text3);float:right;font-family:inherit}
.legend{display:flex;gap:12px;margin-top:12px;font-size:11px;color:var(--text2);align-items:center;flex-wrap:wrap}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>nailsalon minth</h1>
    <p>ご予約はこちらから</p>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('booking',this)"><i class="ti ti-calendar"></i> 予約する</button>
    <button class="tab" onclick="switchTab('admin',this)"><i class="ti ti-settings"></i> 管理画面</button>
  </div>

  <div id="view-booking" class="view active">
    <div id="cal-view">
      <div class="week-nav">
        <button onclick="changeWeek(-1)"><i class="ti ti-chevron-left"></i></button>
        <span id="week-label"></span>
        <button onclick="changeWeek(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div style="overflow-x:auto">
        <table class="week-grid" id="week-table"></table>
      </div>
      <div class="legend">
        <span><span style="display:inline-block;width:16px;height:16px;border-radius:50%;border:1.5px solid #D4537E;vertical-align:middle"></span> 空き</span>
        <span><span style="display:inline-block;width:16px;height:16px;border-radius:50%;border:1.5px solid #534AB7;vertical-align:middle"></span> 夜間+¥1,000</span>
        <span style="color:#aaa">× 埋まり</span>
      </div>
    </div>
    <div id="success-view" class="success-view" style="display:none">
      <i class="ti ti-circle-check icon"></i>
      <h2>ご予約ありがとうございます</h2>
      <p id="success-detail"></p>
      <button class="btn-again" onclick="resetBooking()">別の日程を予約する</button>
    </div>
  </div>

  <div id="view-admin" class="view">
    <div id="pw-screen" class="pw-screen">
      <i class="ti ti-lock" style="font-size:40px;color:#aaa;margin-bottom:1rem"></i>
      <p>管理画面はサロンオーナー専用です</p>
      <div class="pw-input-row">
        <input type="password" id="pw-input" placeholder="パスワード" onkeydown="if(event.key==='Enter')checkPw()">
        <button onclick="checkPw()">入る</button>
      </div>
      <p class="pw-error" id="pw-error" style="display:none">パスワードが違います</p>
    </div>
    <div id="admin-content" style="display:none">
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
        <button class="logout-btn" onclick="logout()"><i class="ti ti-logout"></i> ログアウト</button>
      </div>
      <div class="admin-section">
        <p class="section-label">予約一覧</p>
        <button class="sync-btn" onclick="loadBookings()"><i class="ti ti-refresh"></i> 最新の予約を取得</button>
        <div class="filter-row">
          <input type="text" id="search-name" placeholder="名前で検索" oninput="renderAdminList()">
          <input type="date" id="filter-date" onchange="renderAdminList()">
        </div>
        <div id="admin-list"><div class="empty-msg">「最新の予約を取得」を押してください</div></div>
      </div>
      <div class="admin-section">
        <p class="section-label">定休日・休業日</p>
        <div class="closed-row">
          <input type="date" id="closed-input">
          <button onclick="addClosedDay()">追加</button>
        </div>
        <div class="closed-tags" id="closed-tags"></div>
      </div>
    </div>
  </div>
</div>

<div class="form-overlay" id="form-overlay">
  <div class="form-handle"></div>
  <p class="form-title">予約内容の入力</p>
  <div class="selected-info" id="selected-info"></div>
  <div id="night-notice" class="night-notice" style="display:none"><i class="ti ti-moon"></i> 19:00以降の夜間枠は +¥1,000 が追加されます</div>
  <div class="field"><label>お名前 *</label><input type="text" id="f-name" placeholder="山田 花子"></div>
  <div class="field"><label>メニュー *</label>
    <select id="f-menu" onchange="updateDuration()">
      <option value="">選択してください</option>
      <optgroup label="ご新規〜3回目">
        <option value="ワンカラー（オフあり）¥3,000" data-min="120">ワンカラー（オフあり）¥3,000</option>
        <option value="ワンカラー（オフなし）¥3,000" data-min="90">ワンカラー（オフなし）¥3,000</option>
        <option value="グラデーション/フレンチ（オフあり）¥4,000" data-min="150">グラデーション/フレンチ（オフあり）¥4,000</option>
        <option value="グラデーション/フレンチ（オフなし）¥4,000" data-min="120">グラデーション/フレンチ（オフなし）¥4,000</option>
        <option value="バーチャルフレンチ（オフあり）¥4,500" data-min="150">バーチャルフレンチ（オフあり）¥4,500</option>
        <option value="バーチャルフレンチ（オフなし）¥4,500" data-min="120">バーチャルフレンチ（オフなし）¥4,500</option>
        <option value="マグネットネイル（オフあり）¥4,000" data-min="150">マグネットネイル（オフあり）¥4,000</option>
        <option value="マグネットネイル（オフなし）¥4,000" data-min="120">マグネットネイル（オフなし）¥4,000</option>
        <option value="定額デザイン（オフあり）¥5,000" data-min="180">定額デザイン（オフあり）¥5,000</option>
        <option value="定額デザイン（オフなし）¥5,000" data-min="150">定額デザイン（オフなし）¥5,000</option>
        <option value="持ち込みデザイン（オフあり）¥6,500〜" data-min="180">持ち込みデザイン（オフあり）¥6,500〜</option>
        <option value="持ち込みデザイン（オフなし）¥6,500〜" data-min="150">持ち込みデザイン（オフなし）¥6,500〜</option>
      </optgroup>
      <optgroup label="リピーター">
        <option value="ワンカラー（オフあり）¥5,000" data-min="120">ワンカラー（オフあり）¥5,000</option>
        <option value="ワンカラー（オフなし）¥5,000" data-min="90">ワンカラー（オフなし）¥5,000</option>
        <option value="定額デザイン（オフあり）¥7,500" data-min="180">定額デザイン（オフあり）¥7,500</option>
        <option value="定額デザイン（オフなし）¥7,500" data-min="150">定額デザイン（オフなし）¥7,500</option>
        <option value="持ち込みデザイン（オフあり）¥8,000〜" data-min="180">持ち込みデザイン（オフあり）¥8,000〜</option>
        <option value="持ち込みデザイン（オフなし）¥8,000〜" data-min="150">持ち込みデザイン（オフなし）¥8,000〜</option>
      </optgroup>
    </select>
  </div>
  <div class="field"><label>所要時間</label><input type="text" id="f-duration" readonly placeholder="メニューを選択してください" style="color:#aaa"></div>
  <div class="field"><label>メモ（任意）</label><textarea id="f-note" placeholder="アレルギーや気になることなど"></textarea></div>
  <button class="btn-primary" id="submit-btn" onclick="submitBooking()">予約を確定する</button>
  <button class="btn-cancel" onclick="closeForm()">キャンセル</button>
</div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycby3pLvezMgOKCbZN0PxgKjjtd-2M8ZswKkcl0z1N2C-qWTx_3ak6ZnrxzY0me1EePZlpA/exec';
const PW='kegp5fi';
const TIMES=['10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30','19:00','19:30','20:00','20:30','21:00'];
const DAYS=['日','月','火','水','木','金','土'];
let bookings=[],closedDays=JSON.parse(localStorage.getItem('minth_closed')||'[]');
let weekOffset=0,selectedDate=null,selectedTime=null,submitting=false,adminUnlocked=false;

function checkPw(){
  const v=document.getElementById('pw-input').value;
  if(v===PW){adminUnlocked=true;document.getElementById('pw-screen').style.display='none';document.getElementById('admin-content').style.display='block';document.getElementById('pw-error').style.display='none';}
  else{document.getElementById('pw-error').style.display='block';document.getElementById('pw-input').value='';}
}
function logout(){adminUnlocked=false;document.getElementById('pw-screen').style.display='flex';document.getElementById('admin-content').style.display='none';document.getElementById('pw-input').value='';}
function switchTab(t,btn){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));btn.classList.add('active');document.getElementById('view-'+t).classList.add('active');}
function getWeekDates(o){const t=new Date();const m=new Date(t);m.setDate(t.getDate()-t.getDay()+1+(o*7));return Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d;});}
function fmt(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function changeWeek(d){weekOffset+=d;if(weekOffset<0)weekOffset=0;renderWeek();}
function renderWeek(){
  const dates=getWeekDates(weekOffset);
  const today=new Date();today.setHours(0,0,0,0);
  const first=dates[0],last=dates[6];
  document.getElementById('week-label').textContent=`${first.getMonth()+1}/${first.getDate()} 〜 ${last.getMonth()+1}/${last.getDate()}`;
  const table=document.getElementById('week-table');
  let html='<thead><tr><th></th>';
  dates.forEach(d=>{const isToday=d.getTime()===today.getTime();const dow=d.getDay();const cls=`date-col${isToday?' today-col':''}${dow===0?' sun':dow===6?' sat':''}`;html+=`<th class="${cls}">${d.getMonth()+1}/${d.getDate()}<br><span style="font-size:10px">${DAYS[dow]}</span></th>`;});
  html+='</tr></thead><tbody>';
  TIMES.forEach(t=>{
    const [h]=t.split(':').map(Number);const isNight=h>=19;
    html+=`<tr><td class="time-label">${t}</td>`;
    dates.forEach(d=>{
      const ds=fmt(d);const nowH=new Date().getHours();
      const isPast=d<today||(d.getTime()===today.getTime()&&h<=nowH);
      const isClosed=closedDays.includes(ds);const isBooked=bookings.some(b=>b.date===ds&&b.time===t);const isSelected=selectedDate===ds&&selectedTime===t;
      let cls,content;
      if(isPast||isClosed){cls='slot-btn closed';content='×';}
      else if(isBooked){cls='slot-btn booked';content='×';}
      else if(isSelected){cls='slot-btn selected';content='○';}
      else if(isNight){cls='slot-btn night-available';content='○';}
      else{cls='slot-btn available';content='○';}
      const clickable=!isPast&&!isClosed&&!isBooked;
      html+=`<td><button class="${cls}" ${clickable?`onclick="selectSlot('${ds}','${t}')"`:''} ${!clickable?'disabled':''}>${content}</button></td>`;
    });
    html+='</tr>';
  });
  html+='</tbody>';table.innerHTML=html;
}
function selectSlot(date,time){selectedDate=date;selectedTime=time;renderWeek();const d=new Date(date+'T00:00:00');document.getElementById('selected-info').textContent=`${d.getMonth()+1}月${d.getDate()}日（${DAYS[d.getDay()]}） ${time}〜`;const [h]=time.split(':').map(Number);document.getElementById('night-notice').style.display=h>=19?'block':'none';document.getElementById('form-overlay').classList.add('open');}
function closeForm(){document.getElementById('form-overlay').classList.remove('open');selectedDate=null;selectedTime=null;renderWeek();}
function updateDuration(){const sel=document.getElementById('f-menu');const opt=sel.options[sel.selectedIndex];document.getElementById('f-duration').value=opt.dataset.min?`${opt.dataset.min}分`:'';}
async function submitBooking(){
  if(submitting)return;
  const name=document.getElementById('f-name').value.trim();const menu=document.getElementById('f-menu').value;const note=document.getElementById('f-note').value.trim();
  const sel=document.getElementById('f-menu');const opt=sel.options[sel.selectedIndex];const duration=opt.dataset.min?`${opt.dataset.min}分`:'';
  if(!name||!menu){alert('お名前とメニューを入力してください');return;}
  submitting=true;const btn=document.getElementById('submit-btn');btn.disabled=true;btn.textContent='送信中...';
  try{
    await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({date:selectedDate,time:selectedTime,name,menu,duration,note})});
    bookings.push({date:selectedDate,time:selectedTime,name,menu,duration,note});
    const d=new Date(selectedDate+'T00:00:00');
    document.getElementById('success-detail').innerHTML=`${d.getMonth()+1}月${d.getDate()}日（${DAYS[d.getDay()]}） ${selectedTime}〜<br>${name} 様<br>${menu}`;
    document.getElementById('form-overlay').classList.remove('open');document.getElementById('cal-view').style.display='none';document.getElementById('success-view').style.display='block';
  }catch(e){alert('送信に失敗しました。もう一度お試しください。');}
  submitting=false;btn.disabled=false;btn.textContent='予約を確定する';
}
function resetBooking(){selectedDate=null;selectedTime=null;document.getElementById('f-name').value='';document.getElementById('f-menu').value='';document.getElementById('f-duration').value='';document.getElementById('f-note').value='';document.getElementById('cal-view').style.display='block';document.getElementById('success-view').style.display='none';renderWeek();}
async function loadBookings(){
  const el=document.getElementById('admin-list');el.innerHTML='<div class="empty-msg">読み込み中...</div>';
  try{const res=await fetch(GAS_URL+'?action=list');const data=await res.json();bookings=data.bookings.filter(b=>b.id);renderAdminList();renderWeek();}
  catch(e){el.innerHTML='<div class="empty-msg">取得できませんでした。再度お試しください。</div>';}
}
function renderAdminList(){
  const search=document.getElementById('search-name').value.toLowerCase();const fd=document.getElementById('filter-date').value;
  let list=[...bookings];if(search)list=list.filter(b=>b.name&&b.name.toLowerCase().includes(search));if(fd)list=list.filter(b=>b.date===fd);
  list.sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  const el=document.getElementById('admin-list');
  if(!list.length){el.innerHTML='<div class="empty-msg">予約はありません</div>';return;}
  el.innerHTML=list.map(b=>{
    const d=new Date((b.date||'')+'T00:00:00');const isNew=b.createdAt&&new Date(b.createdAt)>new Date(Date.now()-24*60*60*1000);const [h]=((b.time||'00:00').split(':').map(Number));const isNight=h>=19;
    return `<div class="booking-card"><div><div class="name">${b.name||''}様${isNew?'<span class="badge badge-new">新着</span>':''}${isNight?'<span class="badge badge-night">夜間</span>':''}</div><div class="detail">${b.date?`${d.getMonth()+1}/${d.getDate()}（${DAYS[d.getDay()]}）`:''} ${b.time||''}〜（${b.duration||''}）<br>${b.menu||''}${b.note?`<br>メモ：${b.note}`:''}</div></div><button class="btn-del" onclick="deleteBooking('${b.id}')"><i class="ti ti-trash"></i></button></div>`;
  }).join('');
}
async function deleteBooking(id){if(!confirm('この予約を削除しますか？'))return;bookings=bookings.filter(b=>b.id!==id);renderAdminList();renderWeek();}
function addClosedDay(){const v=document.getElementById('closed-input').value;if(!v)return;if(!closedDays.includes(v))closedDays.push(v);localStorage.setItem('minth_closed',JSON.stringify(closedDays));document.getElementById('closed-input').value='';renderClosedTags();renderWeek();}
function removeClosedDay(d){closedDays=closedDays.filter(x=>x!==d);localStorage.setItem('minth_closed',JSON.stringify(closedDays));renderClosedTags();renderWeek();}
function renderClosedTags(){const el=document.getElementById('closed-tags');if(!closedDays.length){el.innerHTML='<span style="font-size:12px;color:#aaa">設定なし</span>';return;}el.innerHTML=[...closedDays].sort().map(d=>{const dt=new Date(d+'T00:00:00');return `<div class="closed-tag">${dt.getMonth()+1}/${dt.getDate()}<button onclick="removeClosedDay('${d}')">×</button></div>`;}).join('');}
renderWeek();renderClosedTags();
</script>
